<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dream Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; }
    canvas { display: block; }

    /* ── Story screen ───────────────────────────────────────────────── */
    #story-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0f;
      font-family: monospace;
    }
    .story-content {
      max-width: 600px; padding: 40px 32px; text-align: center; color: #ccc;
    }
    .story-content h1 {
      font-size: 36px; color: #fff; letter-spacing: 4px; margin-bottom: 28px;
      text-transform: uppercase;
    }
    .story-content .subtitle {
      font-size: 12px; letter-spacing: 4px; color: #6bb8ff;
      text-transform: uppercase; margin-bottom: 36px;
      background: rgba(68,153,255,0.12); padding: 4px 12px; border-radius: 4px;
      display: inline-block;
    }
    .story-content p {
      font-size: 14px; line-height: 1.9; margin-bottom: 18px; color: #aaa;
    }
    .story-content p em { color: #ddd; font-style: normal; }
    .story-content .phase-label {
      margin: 32px 0 8px;
      font-size: 11px; letter-spacing: 3px; color: #ff4444;
      text-transform: uppercase;
    }
    .story-content .phase-title {
      font-size: 20px; color: #fff; margin-bottom: 32px;
    }
    .story-content button {
      padding: 12px 40px; font-size: 15px; letter-spacing: 2px;
      border: 1px solid #4499ff; border-radius: 4px;
      background: transparent; color: #4499ff; cursor: pointer;
      text-transform: uppercase; font-family: monospace;
      transition: background 0.2s, color 0.2s;
    }
    .story-content button:hover { background: #4499ff; color: #000; }

    /* ── Typewriter ─────────────────────────────────────────────── */
    .tw-line { color: #00ff41; display: block; min-height: 1.9em; }
    .tw-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: #00ff41; margin-left: 2px; vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    #story-btn { opacity: 0; transition: opacity 0.6s; pointer-events: none; }
    #story-btn.ready { opacity: 1; pointer-events: auto; }
    .hud-badge { font-size:11px; letter-spacing:2px; color:#888; text-transform:uppercase; }
    .btn-secondary {
      margin-top:8px; background:#222; border:1px solid #555; color:#fff;
      cursor:pointer; font-family:monospace; padding:6px 16px; border-radius:4px;
    }

    /* ── Phase 2 / Rio ─────────────────────────────────────────────── */
    #p2-canvas-wrap { position: fixed; inset: 0; z-index: 1; display: none; }
    #p2-canvas-wrap.show { display: block; }
    #p2-hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2;
      display: none; justify-content: space-between; align-items: center;
      font-family: monospace; font-size: 11px; letter-spacing: 3px;
      color: #444; padding: 6px 14px; pointer-events: none;
      text-transform: uppercase;
    }
    #p2-hud.show { display: flex; }

    /* ── Level Select ───────────────────────────────────────────────── */
    #level-select {
      position: fixed; inset: 0; z-index: 99; display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 32px;
      background: #0a0a0f; font-family: monospace; color: #fff;
    }
    #level-select.show { display: flex; }
    #level-select h2 {
      font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: #555;
    }
    .level-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .level-card {
      width: 140px; padding: 24px 16px; text-align: center;
      border: 1px solid #333; border-radius: 6px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .level-card:hover:not(.locked) { border-color: #00ff41; background: rgba(0,255,65,0.06); }
    .level-card.locked { opacity: 0.35; cursor: default; }
    .level-card .card-phase {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: #555; margin-bottom: 8px;
    }
    .level-card .card-name { font-size: 20px; color: #fff; margin-bottom: 6px; }
    .level-card .card-sub  { font-size: 11px; color: #555; }
    .level-card.easy   { border-color: #2255cc; }
    .level-card.medium { border-color: #cc8822; }
    .level-card.hard   { border-color: #cc2222; }
    .level-card.phase2 { border-color: #ff2d78; }
    .level-card.easy:hover   { border-color: #4499ff; background: rgba(68,153,255,0.06); }
    .level-card.medium:hover:not(.locked) { border-color: #ffaa44; background: rgba(255,170,68,0.06); }
    .level-card.hard:hover:not(.locked)   { border-color: #ff4444; background: rgba(255,68,68,0.06); }
    .level-card.phase2:hover:not(.locked) { border-color: #ff2d78; background: rgba(255,45,120,0.06); }

    /* ── HUD ────────────────────────────────────────────────────────── */
    #hud {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 24px; align-items: center;
      font-family: monospace; color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 8px;
      pointer-events: none;
    }
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar { width: 120px; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
    .fill { height: 100%; width: 0%; border-radius: 5px; transition: width 0.1s; }
    .fill.blue { background: #4499ff; }
    .fill.red  { background: #ff4444; }

    /* ── Win / lose overlay ─────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; background: rgba(0,0,0,0.75);
      font-family: monospace; color: #fff; text-align: center; padding: 24px;
    }
    #overlay.show { display: flex; }
    #overlay h1 { font-size: 44px; }
    #overlay .next-label {
      font-size: 11px; letter-spacing: 3px; color: #888; text-transform: uppercase;
      margin-top: 8px;
    }
    #overlay .next-title { font-size: 18px; color: #aaa; margin-bottom: 8px; }
    #overlay .coming-badge {
      font-size: 11px; letter-spacing: 2px; color: #ff4444;
      border: 1px solid #ff4444; border-radius: 4px;
      padding: 3px 10px; text-transform: uppercase; margin-bottom: 20px;
    }
    #overlay button {
      padding: 10px 28px; font-size: 16px; border: none; border-radius: 6px;
      background: #4499ff; color: #fff; cursor: pointer; font-family: monospace;
    }
  </style>
</head>
<body>
  <!-- Story / intro screen -->
  <div id="story-screen">
    <div class="story-content">
      <div class="subtitle">A true story</div>
      <h1>The Dream</h1>

      <p id="tw-p1"><span class="tw-line"></span></p>
      <p id="tw-p2"><span class="tw-line"></span></p>
      <p id="tw-p3"><span class="tw-line"></span></p>
      <p id="tw-p4"><span class="tw-line"></span></p>
      <p id="tw-p5"><span class="tw-line"></span></p>
      <p id="tw-p6" style="font-size:12px; color:#666;"><span class="tw-line"></span></p>

      <div class="phase-label">Now Playing</div>
      <div class="phase-title" id="story-phase-title">Phase 1</div>

      <button id="story-btn">Start</button>
    </div>
  </div>

  <!-- Level select -->
  <div id="level-select">
    <h2>Select Level</h2>
    <div class="level-cards">
      <div class="level-card hard" id="card-hard">
        <div class="card-phase">Phase 1</div>
        <div class="card-name">Dream</div>
        <div class="card-sub">No mercy</div>
      </div>
      <div class="level-card phase2 locked" id="card-phase2">
        <div class="card-phase">Phase 2</div>
        <div class="card-name">Rio</div>
        <div class="card-sub" id="card-phase2-sub">The maze</div>
      </div>
    </div>
  </div>

  <!-- Phase 2 canvas (hidden until activated) -->
  <div id="p2-canvas-wrap"></div>

  <!-- Phase 2 / Rio HUD -->
  <div id="p2-hud">
    <span>RIO</span>
    <span>find the exit</span>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="bar-wrap">
      <span>BLUE</span>
      <div class="bar"><div id="blue-fill" class="fill blue"></div></div>
      <span id="blue-score">0</span><span>/100</span>
    </div>
    <div class="bar-wrap">
      <span>RED</span>
      <div class="bar"><div id="red-fill" class="fill red"></div></div>
      <span id="red-score">0</span><span>/100</span>
    </div>
    <span id="hud-level" class="hud-badge">DREAM</span>
  </div>

  <!-- Win / lose overlay -->
  <div id="overlay">
    <h1 id="overlay-title">YOU WIN</h1>
    <div id="overlay-next" style="display:none">
      <div class="next-label">Unlocked</div>
      <div class="next-title" id="overlay-next-title">Phase 1 / Medium</div>
    </div>
    <button class="btn-secondary" id="choose-level-btn" style="display:none">Choose Level</button>
    <button id="overlay-play-again-btn" onclick="window.overlayRestart()">Play Again</button>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    window.THREE = THREE; // expose for restart helper

    // ── Constants ──────────────────────────────────────────────────────────
    const BOARD_W         = 30;
    const BOARD_D         = 30;
    const HALF_D          = BOARD_D / 2;
    const UNIT_RADIUS     = 0.6;
    const REPULSION_DIST  = 1.4;
    const REPULSION_K     = 3.0;
    const SPRING_K        = 14.0;
    const DAMPING         = 3.0;
    const DIFFICULTY_CONFIGS = {
      easy:   { bulletSpeed: 6.0,  spawnInterval: 0.22, aiSpeedStart: 3.5,  aiSpeedEnd: 6.0,  aiRampSeconds: 90, winScore: 100 },
      medium: { bulletSpeed: 9.0,  spawnInterval: 0.16, aiSpeedStart: 6.0,  aiSpeedEnd: 11.0, aiRampSeconds: 60, winScore: 100 },
      hard:   { bulletSpeed: 13.0, spawnInterval: 0.11, aiSpeedStart: 10.0, aiSpeedEnd: 18.0, aiRampSeconds: 40, winScore: 100 },
    };

    window.overlayRestart = function() { restartGame(); };
    let BULLET_SPEED    = 6.0;
    let SPAWN_INTERVAL  = 0.22;
    let RED_BASE_SPEED  = 3.5;
    let RED_END_SPEED   = 6.0;
    let AI_RAMP_SECS    = 90;
    const BLUE_COLOR      = 0x2255cc;
    const RED_COLOR       = 0xcc2222;
    const BULLET_BLUE_COLOR = 0x4499ff;
    const BULLET_RED_COLOR  = 0xff4444;

    // ── Pure functions (tested at startup) ────────────────────────────────
    function bulletHitsUnit(bx, bz, ux, uz) {
      const dx = bx - ux, dz = bz - uz;
      return Math.sqrt(dx * dx + dz * dz) < UNIT_RADIUS;
    }

    // Inline tests — check console for PASS/FAIL
    (function testBulletHitsUnit() {
      console.assert(bulletHitsUnit(0, 0, 0, 0)      === true,  'FAIL: direct hit');
      console.assert(bulletHitsUnit(0.5, 0, 0, 0)    === true,  'FAIL: near hit');
      console.assert(bulletHitsUnit(0.7, 0, 0, 0)    === false, 'FAIL: near miss');
      console.assert(bulletHitsUnit(10, 10, 0, 0)    === false, 'FAIL: far miss');
      console.log('bulletHitsUnit: all tests PASS');
    })();

    function calcCoverage(units) {
      if (units.length === 0) return 0;
      const intervals = units.map(u => [
        u.mesh.position.x - UNIT_RADIUS,
        u.mesh.position.x + UNIT_RADIUS
      ]);
      intervals.sort((a, b) => a[0] - b[0]);
      let covered = 0, cur = null;
      for (const [l, r] of intervals) {
        if (!cur) { cur = [l, r]; continue; }
        if (l <= cur[1]) cur[1] = Math.max(cur[1], r);
        else { covered += cur[1] - cur[0]; cur = [l, r]; }
      }
      if (cur) covered += cur[1] - cur[0];
      return Math.min(covered / (BOARD_W - 1.0), 1);
    }

    // Inline tests
    (function testCalcCoverage() {
      const u = x => ({ mesh: { position: { x, z: 1 } } });
      const empty = calcCoverage([]);
      console.assert(empty === 0, 'FAIL: empty coverage should be 0');
      const one = calcCoverage([u(0)]);
      console.assert(Math.abs(one - (2 * UNIT_RADIUS / (BOARD_W - 1.0))) < 0.001, 'FAIL: single unit coverage');
      const overlap = calcCoverage([u(0), u(0.2)]);
      console.assert(overlap <= one * 2, 'FAIL: overlapping should not exceed double');
      console.log('calcCoverage: all tests PASS');
    })();

    // ── Renderer ───────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // ── Scene ──────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // ── Isometric Camera ───────────────────────────────────────────────────
    const aspect = window.innerWidth / window.innerHeight;
    const d = 22;
    const camera = new THREE.OrthographicCamera(
      -d * aspect, d * aspect, d, -d, 0.1, 300
    );
    camera.position.set(36, 36, 36);
    camera.lookAt(0, 0, 0);

    // ── Lights ─────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // ── Board ──────────────────────────────────────────────────────────────
    // Main board surface
    const boardGeo = new THREE.BoxGeometry(BOARD_W, 0.15, BOARD_D);
    const boardMat = new THREE.MeshLambertMaterial({ color: 0xe8e8ec });
    const boardMesh = new THREE.Mesh(boardGeo, boardMat);
    boardMesh.position.y = -0.08;
    scene.add(boardMesh);

    // Red zone tint (top half: negative Z)
    const redZoneGeo = new THREE.PlaneGeometry(BOARD_W, HALF_D);
    const redZoneMat = new THREE.MeshBasicMaterial({
      color: 0xff2222, transparent: true, opacity: 0.07, depthWrite: false
    });
    const redZone = new THREE.Mesh(redZoneGeo, redZoneMat);
    redZone.rotation.x = -Math.PI / 2;
    redZone.position.set(0, 0.01, -HALF_D / 2);
    scene.add(redZone);

    // Blue zone tint (bottom half: positive Z)
    const blueZoneGeo = new THREE.PlaneGeometry(BOARD_W, HALF_D);
    const blueZoneMat = new THREE.MeshBasicMaterial({
      color: 0x2255ff, transparent: true, opacity: 0.07, depthWrite: false
    });
    const blueZone = new THREE.Mesh(blueZoneGeo, blueZoneMat);
    blueZone.rotation.x = -Math.PI / 2;
    blueZone.position.set(0, 0.01, HALF_D / 2);
    scene.add(blueZone);

    // Center dashed line (series of short boxes)
    const dashMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
    const dashCount = 24;
    for (let i = 0; i < dashCount; i++) {
      const dash = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 0.05, 0.12),
        dashMat
      );
      dash.position.set(
        -BOARD_W / 2 + (i + 0.5) * (BOARD_W / dashCount),
        0.02, 0
      );
      scene.add(dash);
    }

    // Board border (edge outline)
    const boardEdges = new THREE.LineSegments(
      new THREE.EdgesGeometry(boardGeo),
      new THREE.LineBasicMaterial({ color: 0x8899bb })
    );
    boardEdges.position.y = -0.08;
    scene.add(boardEdges);

    // ── Resize handler ─────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      const a = window.innerWidth / window.innerHeight;
      camera.left = -d * a; camera.right = d * a;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    // ── Units ──────────────────────────────────────────────────────────────
    function createUnitMesh(color) {
      const g = new THREE.Group();
      const mat = new THREE.MeshLambertMaterial({ color });
      const add = (w, h, depth, x, y, z) => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, depth), mat);
        m.position.set(x, y, z);
        g.add(m);
      };
      add(0.28, 0.28, 0.28,  0,    1.08, 0);   // head
      add(0.38, 0.42, 0.20,  0,    0.70, 0);   // torso
      add(0.14, 0.38, 0.14, -0.28, 0.65, 0);   // left arm
      add(0.14, 0.38, 0.14,  0.28, 0.65, 0);   // right arm
      add(0.14, 0.42, 0.14, -0.14, 0.22, 0);   // left leg
      add(0.14, 0.42, 0.14,  0.14, 0.22, 0);   // right leg
      return g;
    }

    class Unit {
      constructor(side) {
        this.side = side; // 'blue' | 'red'
        this.mesh = createUnitMesh(side === 'blue' ? BLUE_COLOR : RED_COLOR);
        this.vx = 0;
        this.vz = 0;
        this.bobOffset = Math.random() * Math.PI * 2; // idle animation phase
        this.spawnScale = 0; // 0→1 pop-in animation
      }
    }

    const blueUnits = [];
    const redUnits  = [];

    function spawnUnit(side) {
      const u = new Unit(side);
      const x = (Math.random() - 0.5) * (BOARD_W - 1.5);
      const z = side === 'blue'
        ? HALF_D * 0.1 + Math.random() * (HALF_D - 0.4)
        : -HALF_D * 0.1 - Math.random() * (HALF_D - 0.4);
      u.mesh.position.set(x, 0, z);
      u.mesh.scale.setScalar(0.01); // start tiny for pop animation
      scene.add(u.mesh);
      if (side === 'blue') blueUnits.push(u); else redUnits.push(u);
    }

    // Spawn starting units
    for (let i = 0; i < 3; i++) spawnUnit('blue');
    for (let i = 0; i < 3; i++) spawnUnit('red');

    // ── Bullets ────────────────────────────────────────────────────────────
    const BULLET_GEO      = new THREE.BoxGeometry(0.18, 0.18, 0.18);
    const BULLET_MAT_BLUE = new THREE.MeshBasicMaterial({ color: BULLET_BLUE_COLOR });
    const BULLET_MAT_RED  = new THREE.MeshBasicMaterial({ color: BULLET_RED_COLOR });

    class Bullet {
      constructor(side, x, speedScale = 1) {
        this.side = side;
        const color = side === 'blue' ? BULLET_BLUE_COLOR : BULLET_RED_COLOR;
        const mat   = side === 'blue' ? BULLET_MAT_BLUE : BULLET_MAT_RED;
        this.mesh = new THREE.Mesh(BULLET_GEO, mat);
        const z = side === 'blue' ? HALF_D : -HALF_D;
        this.mesh.position.set(x, 0.5, z);
        this.vz = (side === 'blue' ? -BULLET_SPEED : BULLET_SPEED) * speedScale;
        // Glow
        const light = new THREE.PointLight(color, 0.8, 1.5);
        this.mesh.add(light);
        scene.add(this.mesh);
        this.alive = true;
      }
      destroy() {
        scene.remove(this.mesh);
        // geometry and material are shared — do not dispose them
        this.alive = false;
      }
    }

    const blueBullets = [];
    const redBullets  = [];
    let blueSpawnTimer = 0;
    let redSpawnTimer  = 0;
    let gameOver   = false;
    let gamePaused = true;   // paused until story dismissed
    let elapsed    = 0;
    let blueScore  = 0;
    let redScore   = 0;
    let WIN_SCORE = 100;

    // ── Typewriter intro ───────────────────────────────────────────
    (function runTypewriter() {
      const lines = [
        { id: 'tw-p1', text: 'One night I had a dream about a game.' },
        { id: 'tw-p2', text: 'Blue vs Red. Two armies firing at each other across a glowing board. Every bullet that got through the enemy lines added a new soldier to your side. The side that took over the whole board would win.' },
        { id: 'tw-p3', text: 'I woke up thinking it was a real game I had played before. It was not.' },
        { id: 'tw-p4', text: 'So I went to Claude. No coding skills, no experience at all. I just described what I saw in the dream. We talked, I gave feedback, and bit by bit it became real.' },
        { id: 'tw-p5', text: 'This is Phase 1. The game exactly as I dreamed it.' },
        { id: 'tw-p6', text: 'Phase 2 is coming. Something bigger.' },
      ];

      const CHAR_DELAY = 28;
      const LINE_PAUSE = 320;

      // Create cursor once and reuse across all ticks
      const cursor = document.createElement('span');
      cursor.className = 'tw-cursor';

      let lineIdx = 0;
      let charIdx = 0;

      function nextChar() {
        if (lineIdx >= lines.length) {
          cursor.remove();
          document.getElementById('story-btn').classList.add('ready');
          return;
        }

        const { id, text } = lines[lineIdx];
        const span = document.querySelector('#' + id + ' .tw-line');
        if (!span) { cursor.remove(); lineIdx++; charIdx = 0; setTimeout(nextChar, LINE_PAUSE); return; }

        if (charIdx === 0) cursor.remove();

        if (charIdx < text.length) {
          span.textContent = text.slice(0, charIdx + 1);
          span.appendChild(cursor);
          charIdx++;
          setTimeout(nextChar, CHAR_DELAY);
        } else {
          lineIdx++;
          charIdx = 0;
          setTimeout(nextChar, LINE_PAUSE);
        }
      }

      setTimeout(nextChar, 600);

      document.getElementById('story-btn').addEventListener('click', () => {
        document.getElementById('story-screen').style.display = 'none';
        showLevelSelect();
      });
    })();

    // ── Level select ──────────────────────────────────────────────────────
    let currentLevel = 'hard';

    const applyDifficulty = (lvl) => {
      const cfg = DIFFICULTY_CONFIGS[lvl] || DIFFICULTY_CONFIGS.hard;
      BULLET_SPEED   = cfg.bulletSpeed;
      SPAWN_INTERVAL = cfg.spawnInterval;
      RED_BASE_SPEED = cfg.aiSpeedStart;
      RED_END_SPEED  = cfg.aiSpeedEnd;
      AI_RAMP_SECS   = cfg.aiRampSeconds;
      WIN_SCORE      = cfg.winScore;
      const badge = document.getElementById('hud-level');
      if (badge) badge.textContent = lvl === 'hard' ? 'DREAM' : lvl.toUpperCase();
    };
    // ── Phase 2 — Rio ─────────────────────────────────────────────────────────
    function startPhase2() {
      // ── Cancel any previous Rio session (removes old event listeners & stops old loop) ──
      if (window._p2abort) window._p2abort.abort();
      const p2abort = new AbortController();
      window._p2abort = p2abort;
      const sig = p2abort.signal;

      // ── Show Rio canvas, hide Phase 1 ──
      window.overlayRestart = startPhase2;
      renderer.domElement.style.display = 'none';
      document.getElementById('hud').style.display = 'none';
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('overlay-play-again-btn').style.display = 'none';
      document.getElementById('choose-level-btn').style.display   = 'none';
      document.getElementById('overlay-next').style.display = 'none';
      document.getElementById('p2-hud').classList.add('show');
      const wrap = document.getElementById('p2-canvas-wrap');
      wrap.innerHTML = '';
      wrap.classList.add('show');

      // ── Canvas setup ──
      const p2canvas = document.createElement('canvas');
      wrap.appendChild(p2canvas);
      const p2ctx = p2canvas.getContext('2d');
      const CW = 510, CH = 444;
      let p2scale = 1, p2ox = 0, p2oy = 0;

      function p2Resize() {
        p2canvas.width  = window.innerWidth;
        p2canvas.height = window.innerHeight;
        p2scale = Math.min(window.innerWidth / CW, window.innerHeight / CH);
        p2ox = (window.innerWidth  - CW * p2scale) / 2;
        p2oy = (window.innerHeight - CH * p2scale) / 2;
      }
      p2Resize();
      window.addEventListener('resize', p2Resize, { signal: sig });

      // Convert browser clientX/Y → canvas logical coords
      function toLogical(cx, cy) {
        return { x: (cx - p2ox) / p2scale, y: (cy - p2oy) / p2scale };
      }

      // ── Map data ──
      const ROOMS = [
        {id:0,  x:8,   y:8,   w:108, h:96,  type:'start'},
        {id:1,  x:8,   y:130, w:108, h:76,  type:'normal'},
        {id:2,  x:8,   y:206, w:108, h:84,  type:'normal'},
        {id:3,  x:8,   y:316, w:108, h:64,  type:'normal'},
        {id:4,  x:8,   y:380, w:108, h:56,  type:'dead'},
        {id:5,  x:140, y:8,   w:90,  h:60,  type:'normal'},
        {id:6,  x:140, y:68,  w:90,  h:76,  type:'normal'},
        {id:7,  x:140, y:170, w:90,  h:84,  type:'normal'},
        {id:8,  x:140, y:254, w:90,  h:72,  type:'normal'},
        {id:9,  x:140, y:352, w:90,  h:84,  type:'dead'},
        {id:10, x:254, y:8,   w:105, h:88,  type:'normal'},
        {id:11, x:254, y:122, w:105, h:68,  type:'normal'},
        {id:12, x:254, y:190, w:105, h:88,  type:'normal'},
        {id:13, x:254, y:304, w:105, h:68,  type:'normal'},
        {id:14, x:254, y:372, w:105, h:64,  type:'dead'},
        {id:15, x:383, y:8,   w:119, h:100, type:'normal'},
        {id:16, x:383, y:108, w:119, h:72,  type:'normal'},
        {id:17, x:383, y:206, w:119, h:76,  type:'normal'},
        {id:18, x:383, y:282, w:119, h:74,  type:'normal'},
        {id:19, x:383, y:382, w:119, h:54,  type:'exit'},
      ];

      // V corridors: h>w  |  H corridors: w>h
      const CORRIDORS = [
        {x:30,  y:104, w:22, h:26, rooms:[0,1]},
        {x:30,  y:290, w:22, h:26, rooms:[2,3]},
        {x:162, y:144, w:22, h:26, rooms:[6,7]},
        {x:162, y:326, w:22, h:26, rooms:[8,9]},
        {x:276, y:96,  w:22, h:26, rooms:[10,11]},
        {x:276, y:278, w:22, h:26, rooms:[12,13]},
        {x:404, y:180, w:22, h:26, rooms:[16,17]},
        {x:404, y:356, w:22, h:26, rooms:[18,19]},
        {x:116, y:22,  w:24, h:20, rooms:[0,5]},
        {x:230, y:72,  w:24, h:20, rooms:[6,10]},
        {x:230, y:256, w:24, h:20, rooms:[8,12]},
        {x:359, y:22,  w:24, h:20, rooms:[10,15]},
        {x:359, y:316, w:24, h:20, rooms:[13,18]},
      ];

      // Shared walls: rooms touching directly with a doorway opening
      const SHARED_WALLS = [
        {y:206, x:30,  w:22, a:1,  b:2 },
        {y:380, x:30,  w:22, a:3,  b:4 },
        {y:68,  x:162, w:22, a:5,  b:6 },
        {y:254, x:162, w:22, a:7,  b:8 },
        {y:190, x:276, w:22, a:11, b:12},
        {y:372, x:276, w:22, a:13, b:14},
        {y:108, x:404, w:22, a:15, b:16},
        {y:282, x:404, w:22, a:17, b:18},
      ];

      // ── Passability ──
      function isPassable(px, py) {
        for (const r of ROOMS)
          if (px >= r.x && px <= r.x+r.w && py >= r.y && py <= r.y+r.h) return true;
        for (const c of CORRIDORS)
          if (px >= c.x && px <= c.x+c.w && py >= c.y && py <= c.y+c.h) return true;
        return false;
      }

      // isPassable tests
      console.assert(isPassable(62, 56)  === true,  'FAIL: center of R0 should be passable');
      console.assert(isPassable(0,  0)   === false, 'FAIL: corner outside all rooms');
      console.assert(isPassable(41, 117) === true,  'FAIL: V corridor R0→R1 should be passable');
      console.assert(isPassable(128, 32) === true,  'FAIL: H corridor R0→R5 should be passable');
      console.log('isPassable: tests done (check for FAIL above)');

      function roomContaining(px, py) {
        for (const r of ROOMS)
          if (px >= r.x && px <= r.x+r.w && py >= r.y && py <= r.y+r.h) return r;
        return null;
      }

      // ── Wall drawing helpers ──
      function openingsFor(r) {
        const op = {top:[],bottom:[],left:[],right:[]};
        for (const c of CORRIDORS) {
          const H = c.w > c.h;
          if (H) {
            if (c.x     === r.x+r.w && c.y>=r.y && c.y+c.h<=r.y+r.h) op.right.push({from:c.y,to:c.y+c.h});
            if (c.x+c.w === r.x     && c.y>=r.y && c.y+c.h<=r.y+r.h) op.left.push ({from:c.y,to:c.y+c.h});
          } else {
            if (c.y     === r.y+r.h && c.x>=r.x && c.x+c.w<=r.x+r.w) op.bottom.push({from:c.x,to:c.x+c.w});
            if (c.y+c.h === r.y     && c.x>=r.x && c.x+c.w<=r.x+r.w) op.top.push   ({from:c.x,to:c.x+c.w});
          }
        }
        for (const sw of SHARED_WALLS) {
          if (sw.a === r.id) op.bottom.push({from:sw.x, to:sw.x+sw.w});
          if (sw.b === r.id) op.top.push   ({from:sw.x, to:sw.x+sw.w});
        }
        return op;
      }

      function segs(ctx, horiz, fixed, start, end, openings) {
        const sorted = [...openings].sort((a,b)=>a.from-b.from);
        let pos = start;
        ctx.beginPath();
        for (const {from,to} of sorted) {
          if (pos < from) horiz ? (ctx.moveTo(pos,fixed),ctx.lineTo(from,fixed)) : (ctx.moveTo(fixed,pos),ctx.lineTo(fixed,from));
          pos = Math.max(pos, to);
        }
        if (pos < end) horiz ? (ctx.moveTo(pos,fixed),ctx.lineTo(end,fixed)) : (ctx.moveTo(fixed,pos),ctx.lineTo(fixed,end));
        ctx.stroke();
      }

      function drawRoomWalls(ctx, r) {
        const {x,y,w,h} = r, op = openingsFor(r);
        segs(ctx,true, y,   x,   x+w, op.top);
        segs(ctx,true, y+h, x,   x+w, op.bottom);
        segs(ctx,false,x,   y,   y+h, op.left);
        segs(ctx,false,x+w, y,   y+h, op.right);
      }

      function drawCorrWalls(ctx, c) {
        const H = c.w > c.h;
        ctx.beginPath();
        if (H) {
          ctx.moveTo(c.x,c.y);     ctx.lineTo(c.x+c.w,c.y);
          ctx.moveTo(c.x,c.y+c.h); ctx.lineTo(c.x+c.w,c.y+c.h);
        } else {
          ctx.moveTo(c.x,c.y);     ctx.lineTo(c.x,c.y+c.h);
          ctx.moveTo(c.x+c.w,c.y); ctx.lineTo(c.x+c.w,c.y+c.h);
        }
        ctx.stroke();
      }

      // ── Draw map ──
      function drawMap(ctx, visitedRooms) {
        ctx.fillStyle = '#07070f';
        ctx.fillRect(0, 0, CW, CH);

        // Floors
        for (const r of ROOMS) {
          if (visitedRooms && !visitedRooms.has(r.id)) continue;
          ctx.fillStyle = r.type==='exit'?'#071a09':r.type==='dead'?'#180a0a':'#10102a';
          ctx.fillRect(r.x, r.y, r.w, r.h);
        }
        for (const c of CORRIDORS) {
          if (visitedRooms && !visitedRooms.has(c.rooms[0]) && !visitedRooms.has(c.rooms[1])) continue;
          ctx.fillStyle = '#0d0d20';
          ctx.fillRect(c.x, c.y, c.w, c.h);
        }

        // Walls
        for (const r of ROOMS) {
          if (visitedRooms && !visitedRooms.has(r.id)) continue;
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = r.type==='exit'?'#006633':r.type==='dead'?'#3a1010':'#222248';
          drawRoomWalls(ctx, r);
        }
        ctx.strokeStyle = '#181830';
        ctx.lineWidth = 1;
        for (const c of CORRIDORS) {
          if (visitedRooms && !visitedRooms.has(c.rooms[0]) && !visitedRooms.has(c.rooms[1])) continue;
          drawCorrWalls(ctx, c);
        }

        // Labels
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for (const r of ROOMS) {
          if (visitedRooms && !visitedRooms.has(r.id)) continue;
          const cx = r.x+r.w/2, cy = r.y+r.h/2;
          if (r.type==='exit')        { ctx.fillStyle='#00cc55'; ctx.font='bold 11px monospace'; ctx.fillText('✦ EXIT',cx,cy); }
          else if (r.type==='dead')   { ctx.fillStyle='#773333'; ctx.font='bold 10px monospace'; ctx.fillText('✕',cx,cy); }
          else if (r.type==='start')  { ctx.fillStyle='#3355aa'; ctx.font='bold 9px monospace';  ctx.fillText('START',cx,cy); }
        }
      }

      // ── Player state ──
      const R0 = ROOMS[0];
      const player = {
        x: R0.x + R0.w / 2,
        y: R0.y + R0.h / 2,
        angle: 0,
        speed: 120,
        radius: 6,
        alive: true,
      };

      // ── Input ──
      const keys = {};
      window.addEventListener('keydown', e => { keys[e.code] = true;  }, { signal: sig });
      window.addEventListener('keyup',   e => { keys[e.code] = false; }, { signal: sig });

      let mouseLogical = { x: player.x, y: player.y };
      window.addEventListener('mousemove', e => {
        mouseLogical = toLogical(e.clientX, e.clientY);
      }, { signal: sig });

      // ── Bullets ──
      const P2_BULLET_SPEED = 400;
      const P2_BULLET_RANGE = 600;
      const playerBullets = [];
      const enemyBullets  = [];

      window.addEventListener('click', e => {
        if (!wrap.classList.contains('show') || p2Over || !player.alive) return;
        playerBullets.push({
          x: player.x + Math.cos(player.angle)*10,
          y: player.y + Math.sin(player.angle)*10,
          vx: Math.cos(player.angle) * P2_BULLET_SPEED,
          vy: Math.sin(player.angle) * P2_BULLET_SPEED,
          dist: 0,
        });
      }, { signal: sig });

      function updateBullets(arr, dt) {
        for (let i = arr.length - 1; i >= 0; i--) {
          const b = arr[i];
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.dist += Math.sqrt(b.vx*b.vx + b.vy*b.vy) * dt;
          if (b.dist > P2_BULLET_RANGE || !isPassable(b.x, b.y)) {
            arr.splice(i, 1);
          }
        }
      }

      function drawBullets(ctx) {
        for (const b of playerBullets) {
          ctx.beginPath();
          ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
          ctx.fillStyle = '#00ccff';
          ctx.fill();
        }
        for (const b of enemyBullets) {
          ctx.beginPath();
          ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
          ctx.fillStyle = '#ff3c3c';
          ctx.fill();
        }
      }

      // ── Enemies ──
      const ENEMY_DEFS = [
        {room:0,  rx:0.7, ry:0.5, patrolAxis:'H'},
        {room:5,  rx:0.5, ry:0.5, patrolAxis:'H'},
        {room:6,  rx:0.5, ry:0.5, patrolAxis:'V'},
        {room:7,  rx:0.5, ry:0.5, patrolAxis:'H'},
        {room:10, rx:0.5, ry:0.5, patrolAxis:'H'},
        {room:12, rx:0.5, ry:0.5, patrolAxis:'V'},
        {room:13, rx:0.5, ry:0.5, patrolAxis:'H'},
        {room:15, rx:0.5, ry:0.5, patrolAxis:'H'},
        {room:17, rx:0.5, ry:0.5, patrolAxis:'V'},
        {room:18, rx:0.5, ry:0.5, patrolAxis:'H'},
      ];

      const enemies = ENEMY_DEFS.map(def => {
        const r = ROOMS[def.room];
        return {
          x: r.x + def.rx * r.w,
          y: r.y + def.ry * r.h,
          angle: def.patrolAxis === 'H' ? 0 : Math.PI/2,
          patrolAxis: def.patrolAxis,
          patrolDir: 1,
          patrolSpeed: 70,
          room: def.room,
          state: 'patrol',
          lostTimer: 0,
          shootTimer: 0,
          alive: true,
        };
      });

      // Line-of-sight: sample 5 points from enemy toward player
      function hasLOS(ex, ey, px, py) {
        for (let t = 0.1; t <= 0.9; t += 0.2) {
          if (!isPassable(ex + (px-ex)*t, ey + (py-ey)*t)) return false;
        }
        return true;
      }

      // Returns true if player is inside enemy's 30° FOV cone at range ≤150
      function canSeePlayer(e) {
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 150) return false;
        const angleToPlayer = Math.atan2(dy, dx);
        let diff = angleToPlayer - e.angle;
        while (diff >  Math.PI) diff -= Math.PI*2;
        while (diff < -Math.PI) diff += Math.PI*2;
        if (Math.abs(diff) > Math.PI*22.5/180) return false;
        return hasLOS(e.x, e.y, player.x, player.y);
      }

      function updateEnemies(dt) {
        for (const e of enemies) {
          if (!e.alive) continue;
          if (!visitedRooms.has(e.room)) continue;

          const sees = player.alive && canSeePlayer(e);

          if (e.state === 'patrol') {
            const r = ROOMS[e.room];
            const margin = 8;
            if (e.patrolAxis === 'H') {
              e.x += e.patrolDir * e.patrolSpeed * dt;
              e.angle = e.patrolDir > 0 ? 0 : Math.PI;
              if (e.x > r.x + r.w - margin) { e.x = r.x + r.w - margin; e.patrolDir = -1; }
              if (e.x < r.x + margin)        { e.x = r.x + margin;        e.patrolDir =  1; }
            } else {
              e.y += e.patrolDir * e.patrolSpeed * dt;
              e.angle = e.patrolDir > 0 ? Math.PI/2 : -Math.PI/2;
              if (e.y > r.y + r.h - margin) { e.y = r.y + r.h - margin; e.patrolDir = -1; }
              if (e.y < r.y + margin)        { e.y = r.y + margin;        e.patrolDir =  1; }
            }
            if (sees) { e.state = 'alert'; e.lostTimer = 0; }

          } else {
            if (sees) {
              e.angle = Math.atan2(player.y - e.y, player.x - e.x);
              e.lostTimer = 0;
              e.shootTimer += dt;
              if (e.shootTimer >= 1.0) {
                e.shootTimer = 0;
                enemyBullets.push({
                  x: e.x + Math.cos(e.angle)*10,
                  y: e.y + Math.sin(e.angle)*10,
                  vx: Math.cos(e.angle) * P2_BULLET_SPEED,
                  vy: Math.sin(e.angle) * P2_BULLET_SPEED,
                  dist: 0,
                });
              }
            } else {
              e.lostTimer += dt;
              if (e.lostTimer >= 3.0) { e.state = 'patrol'; e.shootTimer = 0; }
            }
          }
        }
      }

      function drawEnemies(ctx) {
        for (const e of enemies) {
          if (!e.alive) continue;
          if (!visitedRooms.has(e.room)) continue;

          const fovR = 150, half = Math.PI*22.5/180;
          ctx.beginPath();
          ctx.moveTo(e.x, e.y);
          ctx.arc(e.x, e.y, fovR, e.angle-half, e.angle+half);
          ctx.closePath();
          ctx.fillStyle = 'rgba(255,50,50,0.10)';
          ctx.fill();
          ctx.strokeStyle = e.state==='alert' ? 'rgba(255,80,80,0.5)' : 'rgba(255,80,80,0.25)';
          ctx.lineWidth = 0.7;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(e.x, e.y, 5, 0, Math.PI*2);
          ctx.fillStyle = e.state==='alert' ? '#ff6060' : '#ff3c3c';
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(e.x, e.y);
          ctx.lineTo(e.x + Math.cos(e.angle)*9, e.y + Math.sin(e.angle)*9);
          ctx.strokeStyle = '#ff6666';
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }

      function checkCollisions() {
        for (let bi = playerBullets.length-1; bi >= 0; bi--) {
          const b = playerBullets[bi];
          for (const e of enemies) {
            if (!e.alive) continue;
            const dx = b.x-e.x, dy = b.y-e.y;
            if (Math.sqrt(dx*dx+dy*dy) < 9) {
              e.alive = false;
              playerBullets.splice(bi, 1);
              break;
            }
          }
        }

        if (player.alive) {
          for (let bi = enemyBullets.length-1; bi >= 0; bi--) {
            const b = enemyBullets[bi];
            const dx = b.x-player.x, dy = b.y-player.y;
            if (Math.sqrt(dx*dx+dy*dy) < 8) {
              player.alive = false;
              enemyBullets.splice(bi, 1);
              p2TriggerGameOver(false);
              return;
            }
          }
        }
      }

      function p2TriggerGameOver(won) {
        p2Over = true;
        document.getElementById('overlay-title').textContent = won ? 'YOU WON 🎉' : 'GAME OVER 💀';
        document.getElementById('overlay-play-again-btn').style.display = won ? 'none' : 'block';
        document.getElementById('choose-level-btn').style.display = 'block';
        document.getElementById('overlay-next').style.display = 'none';
        document.getElementById('overlay').classList.add('show');
      }

      function p2CheckWin() {
        const r19 = ROOMS[19];
        if (player.x >= r19.x && player.x <= r19.x+r19.w &&
            player.y >= r19.y && player.y <= r19.y+r19.h) {
          p2TriggerGameOver(true);
        }
      }

      // ── Draw player ──
      function drawPlayer(ctx) {
        const {x, y, angle, radius} = player;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI*2);
        ctx.fillStyle = '#00ccff';
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(angle)*11, y + Math.sin(angle)*11);
        ctx.strokeStyle = '#00eeff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // ── Mini-map ──
      function drawMiniMap(ctx) {
        const S = 6, GAP = 2, COLS = 5;
        const MX = CW - 20 - (COLS * (S + GAP));
        const MY = 20;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(MX - 4, MY - 4, COLS*(S+GAP)+6, 4*(S+GAP)+6);
        for (let i = 0; i < ROOMS.length; i++) {
          const col = i % COLS, row = Math.floor(i / COLS);
          const sx = MX + col*(S+GAP), sy = MY + row*(S+GAP);
          const curRoom = roomContaining(player.x, player.y);
          const isCurrent = curRoom && curRoom.id === i;
          if (isCurrent)                                        ctx.fillStyle = '#00ccff';
          else if (ROOMS[i].type==='exit' && visitedRooms.has(i)) ctx.fillStyle = '#003311';
          else if (visitedRooms.has(i))                         ctx.fillStyle = '#1a1a5a';
          else                                                  ctx.fillStyle = '#111';
          ctx.fillRect(sx, sy, S, S);
        }
      }

      // ── Game state ──
      let p2Over = false;
      const visitedRooms = new Set([0]);

      // ── Game loop ──
      let p2Last = performance.now();

      function p2Loop() {
        if (sig.aborted) return;
        requestAnimationFrame(p2Loop);
        if (p2Over) {
          p2ctx.setTransform(p2scale, 0, 0, p2scale, p2ox, p2oy);
          drawMap(p2ctx, visitedRooms);
          drawEnemies(p2ctx);
          drawPlayer(p2ctx);
          drawBullets(p2ctx);
          drawMiniMap(p2ctx);
          return;
        }

        const now = performance.now();
        const dt  = Math.min((now - p2Last) / 1000, 0.05);
        p2Last = now;

        // ── Update visited rooms ──
        const curRoom = roomContaining(player.x, player.y);
        if (curRoom) visitedRooms.add(curRoom.id);

        // ── Player movement ──
        player.angle = Math.atan2(
          mouseLogical.y - player.y,
          mouseLogical.x - player.x
        );

        let dx = 0, dy = 0;
        if (keys['KeyW'] || keys['ArrowUp'])    dy -= 1;
        if (keys['KeyS'] || keys['ArrowDown'])  dy += 1;
        if (keys['KeyA'] || keys['ArrowLeft'])  dx -= 1;
        if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
        if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

        const PR = player.radius;
        const moveX = dx * player.speed * dt;
        const moveY = dy * player.speed * dt;
        const nx = player.x + moveX;
        const ny = player.y + moveY;
        const canX = isPassable(nx,      player.y     ) &&
                     isPassable(nx + PR, player.y     ) &&
                     isPassable(nx - PR, player.y     ) &&
                     isPassable(nx,      player.y + PR) &&
                     isPassable(nx,      player.y - PR);
        const canY = isPassable(player.x,      ny     ) &&
                     isPassable(player.x + PR, ny     ) &&
                     isPassable(player.x - PR, ny     ) &&
                     isPassable(player.x,      ny + PR) &&
                     isPassable(player.x,      ny - PR);
        if (canX) player.x = nx;
        if (canY) player.y = ny;

        // ── Update bullets ──
        updateBullets(playerBullets, dt);
        updateBullets(enemyBullets, dt);

        // ── Update enemies ──
        updateEnemies(dt);

        // ── Collisions ──
        checkCollisions();

        // ── Win check ──
        if (player.alive) p2CheckWin();

        // ── Render ──
        p2ctx.setTransform(p2scale, 0, 0, p2scale, p2ox, p2oy);
        drawMap(p2ctx, visitedRooms);
        drawEnemies(p2ctx);
        drawPlayer(p2ctx);
        drawBullets(p2ctx);
        drawMiniMap(p2ctx);
      }
      p2Loop();
    }

    function getUnlocked() {
      try {
        return JSON.parse(localStorage.getItem('dg_unlocked') || '["hard","phase2"]');
      } catch {
        return ['hard', 'phase2'];
      }
    }

    function showLevelSelect() {
      const unlocked = getUnlocked();
      ['hard', 'phase2'].forEach(lvl => {
        const el = document.getElementById('card-' + lvl);
        if (el) el.classList.toggle('locked', !unlocked.includes(lvl));
      });
      const p2sub = document.getElementById('card-phase2-sub');
      p2sub.textContent = 'The maze';
      document.getElementById('level-select').classList.add('show');
    }

    ['hard', 'phase2'].forEach(lvl => {
      const card = document.getElementById('card-' + lvl);
      if (!card) return;
      card.addEventListener('click', () => {
        const unlocked = getUnlocked();
        if (!unlocked.includes(lvl)) return;
        currentLevel = lvl;
        document.getElementById('level-select').classList.remove('show');
        if (lvl === 'phase2') {
          gamePaused = false;
          startPhase2();
        } else {
          restartGame();   // resets all state and calls applyDifficulty(currentLevel)
          gamePaused = false;
        }
      });
    });

    document.getElementById('choose-level-btn').addEventListener('click', () => {
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('choose-level-btn').style.display = 'none';
      // Clean up Rio if active
      document.getElementById('p2-canvas-wrap').classList.remove('show');
      document.getElementById('p2-hud').classList.remove('show');
      if (window._p2abort) { window._p2abort.abort(); window._p2abort = null; }
      showLevelSelect();
    });

    // ── Input ──────────────────────────────────────────────────────────────
    const raycaster   = new THREE.Raycaster();
    const boardPlane  = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const cursorWorld = new THREE.Vector3(0, 0, HALF_D / 2); // default: center blue half
    let redCursorX = 0;
    let redCursorZ = -HALF_D / 2;

    window.addEventListener('mousemove', e => {
      const ndc = new THREE.Vector2(
        (e.clientX / window.innerWidth)  *  2 - 1,
        (e.clientY / window.innerHeight) * -2 + 1
      );
      raycaster.setFromCamera(ndc, camera);
      const hit = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(boardPlane, hit)) {
        // Clamp to blue half
        cursorWorld.x = Math.max(-BOARD_W / 2 + 0.5, Math.min(BOARD_W / 2 - 0.5, hit.x));
        cursorWorld.z = Math.max(0.2, Math.min(HALF_D - 0.2, hit.z));
      }
    });

    function updateBlueUnits(dt) {
      for (const u of blueUnits) {
        // Spring toward cursor
        u.vx += (cursorWorld.x - u.mesh.position.x) * SPRING_K * dt;
        u.vz += (cursorWorld.z - u.mesh.position.z) * SPRING_K * dt;

        // Mutual repulsion
        for (const other of blueUnits) {
          if (other === u) continue;
          const ex = u.mesh.position.x - other.mesh.position.x;
          const ez = u.mesh.position.z - other.mesh.position.z;
          const dist = Math.sqrt(ex * ex + ez * ez) || 0.001;
          if (dist < REPULSION_DIST) {
            const f = REPULSION_K / (dist * dist) * dt;
            u.vx += (ex / dist) * f;
            u.vz += (ez / dist) * f;
          }
        }

        // Damping
        u.vx *= Math.max(0, 1 - DAMPING * dt);
        u.vz *= Math.max(0, 1 - DAMPING * dt);

        // Velocity cap (prevents tunneling at high unit counts)
        const MAX_V = 60;
        u.vx = Math.max(-MAX_V, Math.min(MAX_V, u.vx));
        u.vz = Math.max(-MAX_V, Math.min(MAX_V, u.vz));

        // Apply
        u.mesh.position.x += u.vx * dt;
        u.mesh.position.z += u.vz * dt;

        // Bounce off blue half walls
        if (u.mesh.position.x < -BOARD_W / 2 + 0.5) {
          u.mesh.position.x = -BOARD_W / 2 + 0.5;
          u.vx = 45 + Math.random() * 20;
          u.vz += (Math.random() - 0.5) * 10;
        } else if (u.mesh.position.x > BOARD_W / 2 - 0.5) {
          u.mesh.position.x = BOARD_W / 2 - 0.5;
          u.vx = -(45 + Math.random() * 20);
          u.vz += (Math.random() - 0.5) * 10;
        }
        if (u.mesh.position.z < 0.3) {
          u.mesh.position.z = 0.3;
          u.vz = 30 + Math.random() * 15;
          u.vx += (Math.random() - 0.5) * 10;
        } else if (u.mesh.position.z > HALF_D - 0.3) {
          u.mesh.position.z = HALF_D - 0.3;
          u.vz = -(30 + Math.random() * 15);
          u.vx += (Math.random() - 0.5) * 10;
        }
      }
    }

    function updateRedUnits(dt) {
      // Move the AI's virtual cursor toward the weighted average X of incoming blue bullets
      // (weighted by how close each bullet is to the red wall — prioritise imminent threats)
      if (blueBullets.length > 0) {
        let weightedX = 0, totalWeight = 0;
        for (const b of blueBullets) {
          if (!b.alive) continue;
          // z ranges from +HALF_D (blue wall) to -HALF_D (red wall)
          // proximity = 1 when bullet is at red wall, 0 when at blue wall
          const proximity = (-b.mesh.position.z + HALF_D) / (2 * HALF_D);
          const weight = proximity * proximity + 0.1; // quadratic + small base weight
          weightedX += b.mesh.position.x * weight;
          totalWeight += weight;
        }
        const targetX = weightedX / totalWeight;

        // Cursor moves at a capped speed (slower early, faster late — but always beatable)
        const difficulty = Math.min(elapsed / AI_RAMP_SECS, 1);
        const cursorSpeed = (RED_BASE_SPEED + difficulty * (RED_END_SPEED - RED_BASE_SPEED)) * dt;
        const dx = targetX - redCursorX;
        redCursorX += Math.sign(dx) * Math.min(Math.abs(dx), cursorSpeed);
        redCursorX = Math.max(-BOARD_W / 2 + 0.5, Math.min(BOARD_W / 2 - 0.5, redCursorX));
      }

      // Units swarm toward virtual cursor — identical physics to blue units
      for (const u of redUnits) {
        u.vx += (redCursorX - u.mesh.position.x) * SPRING_K * dt;
        u.vz += (redCursorZ - u.mesh.position.z) * SPRING_K * dt;

        // Mutual repulsion
        for (const other of redUnits) {
          if (other === u) continue;
          const ex = u.mesh.position.x - other.mesh.position.x;
          const ez = u.mesh.position.z - other.mesh.position.z;
          const dist = Math.sqrt(ex * ex + ez * ez) || 0.001;
          if (dist < REPULSION_DIST) {
            const f = REPULSION_K / (dist * dist) * dt;
            u.vx += (ex / dist) * f;
            u.vz += (ez / dist) * f;
          }
        }

        // Damping + velocity cap
        u.vx *= Math.max(0, 1 - DAMPING * dt);
        u.vz *= Math.max(0, 1 - DAMPING * dt);
        const MAX_V = 60;
        u.vx = Math.max(-MAX_V, Math.min(MAX_V, u.vx));
        u.vz = Math.max(-MAX_V, Math.min(MAX_V, u.vz));

        // Apply
        u.mesh.position.x += u.vx * dt;
        u.mesh.position.z += u.vz * dt;

        // Bounce off red half walls
        if (u.mesh.position.x < -BOARD_W / 2 + 0.5) {
          u.mesh.position.x = -BOARD_W / 2 + 0.5;
          u.vx = 45 + Math.random() * 20;
          u.vz += (Math.random() - 0.5) * 10;
        } else if (u.mesh.position.x > BOARD_W / 2 - 0.5) {
          u.mesh.position.x = BOARD_W / 2 - 0.5;
          u.vx = -(45 + Math.random() * 20);
          u.vz += (Math.random() - 0.5) * 10;
        }
        if (u.mesh.position.z < -HALF_D + 0.3) {
          u.mesh.position.z = -HALF_D + 0.3;
          u.vz = 30 + Math.random() * 15;
          u.vx += (Math.random() - 0.5) * 10;
        } else if (u.mesh.position.z > -0.3) {
          u.mesh.position.z = -0.3;
          u.vz = -(30 + Math.random() * 15);
          u.vx += (Math.random() - 0.5) * 10;
        }
      }
    }

    function spawnBullet(side) {
      const x = (Math.random() - 0.5) * (BOARD_W - 0.5);
      const speedScale = 1 + Math.min(elapsed * 0.008, 0.6);
      const b = new Bullet(side, x, speedScale);
      if (side === 'blue') blueBullets.push(b); else redBullets.push(b);
    }

    function spawnFlash(position, color) {
      const flash = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 6, 6),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
      );
      flash.position.copy(position);
      scene.add(flash);
      let age = 0;
      let prevT = performance.now();
      const fadeFlash = (now) => {
        const fadeDt = Math.min((now - prevT) / 1000, 0.05);
        prevT = now;
        age += fadeDt;
        flash.material.opacity = Math.max(0, 0.9 - age * 6);
        flash.scale.setScalar(1 + age * 4);
        if (age < 0.18) requestAnimationFrame(fadeFlash);
        else {
          flash.geometry.dispose();
          flash.material.dispose();
          scene.remove(flash);
        }
      };
      requestAnimationFrame(fadeFlash);
    }

    function scatterUnits(units, impactX, impactZ, force) {
      const SCATTER_RADIUS = 3.0;
      for (const u of units) {
        const dx = u.mesh.position.x - impactX;
        const dz = u.mesh.position.z - impactZ;
        const dist = Math.sqrt(dx * dx + dz * dz) || 0.001;
        if (dist < SCATTER_RADIUS) {
          // Closer units get thrown harder — enough to cross the board
          const strength = force * (1 - dist / SCATTER_RADIUS);
          u.vx += (dx / dist) * strength;
          u.vz += (dz / dist) * strength;
        }
      }
    }

    function checkWin() {
      if      (blueScore >= WIN_SCORE) triggerGameOver('YOU WIN 🎉');
      else if (redScore  >= WIN_SCORE) triggerGameOver('YOU LOSE 💀');
    }

    function triggerGameOver(message) {
      gameOver = true;
      document.getElementById('overlay-title').textContent = message;

      const won = message.includes('WIN');
      const nextMap = { hard: 'phase2' };
      const next = nextMap[currentLevel];

      if (won && next) {
        const unlocked = getUnlocked();
        if (!unlocked.includes(next)) {
          unlocked.push(next);
          localStorage.setItem('dg_unlocked', JSON.stringify(unlocked));
        }
      }

      const nextDiv   = document.getElementById('overlay-next');
      const nextTitle = document.getElementById('overlay-next-title');
      if (won && next && nextDiv && nextTitle) {
        nextDiv.style.display = 'block';
        const labels = { phase2: 'Phase 2 / Rio' };
        nextTitle.textContent = labels[next];
      } else if (nextDiv) {
        nextDiv.style.display = 'none';
      }

      document.getElementById('overlay-play-again-btn').style.display = 'block';
      document.getElementById('choose-level-btn').style.display = won ? 'block' : 'none';
      document.getElementById('overlay').classList.add('show');
    }

    window.restartGame = function() {
      // Clear all objects from scene and arrays
      for (const u of [...blueUnits, ...redUnits]) {
        u.mesh.traverse(child => { if (child.isMesh) child.geometry.dispose(); });
        scene.remove(u.mesh);
      }
      for (const b of [...blueBullets, ...redBullets]) b.destroy();
      blueUnits.length = 0; redUnits.length = 0;
      blueBullets.length = 0; redBullets.length = 0;
      blueSpawnTimer = 0; redSpawnTimer = 0;
      elapsed = 0; gameOver = false; blueScore = 0; redScore = 0;
      document.getElementById('overlay').classList.remove('show');
      applyDifficulty(currentLevel);
      for (let i = 0; i < 3; i++) { spawnUnit('blue'); spawnUnit('red'); }
    };

    function updateHUD() {
      document.getElementById('blue-fill').style.width  = Math.min(blueScore, WIN_SCORE) + '%';
      document.getElementById('red-fill').style.width   = Math.min(redScore,  WIN_SCORE) + '%';
      document.getElementById('blue-score').textContent = blueScore;
      document.getElementById('red-score').textContent  = redScore;
    }

    // ── Game Loop ──────────────────────────────────────────────────────────
    let lastTime = performance.now();

    function gameLoop() {
      requestAnimationFrame(gameLoop);
      if (gamePaused || gameOver) { renderer.render(scene, camera); return; }

      const now = performance.now();
      const dt  = Math.min((now - lastTime) / 1000, 0.05);
      lastTime  = now;
      elapsed  += dt;

      // ── Spawn bullets ──
      blueSpawnTimer += dt;
      redSpawnTimer  += dt;
      const interval = Math.max(0.10, SPAWN_INTERVAL - elapsed * 0.0005);
      if (blueSpawnTimer >= interval) { spawnBullet('blue'); blueSpawnTimer = 0; }
      if (redSpawnTimer  >= interval) { spawnBullet('red');  redSpawnTimer  = 0; }

      // ── Move bullets ──
      for (const b of blueBullets) {
        if (!b.alive) continue;
        b.mesh.position.z += b.vz * dt;
        if (b.mesh.position.z < -HALF_D - 1) b.destroy();
      }
      for (const b of redBullets) {
        if (!b.alive) continue;
        b.mesh.position.z += b.vz * dt;
        if (b.mesh.position.z > HALF_D + 1) b.destroy();
      }

      // ── Remove dead bullets ──
      for (let i = blueBullets.length - 1; i >= 0; i--) {
        if (!blueBullets[i].alive) blueBullets.splice(i, 1);
      }
      for (let i = redBullets.length - 1; i >= 0; i--) {
        if (!redBullets[i].alive) redBullets.splice(i, 1);
      }

      // ── Controls ──
      updateBlueUnits(dt);
      updateRedUnits(dt);

      // ── Collision: red bullets vs blue units ──
      for (const b of redBullets) {
        if (!b.alive) continue;
        for (const u of blueUnits) {
          if (bulletHitsUnit(b.mesh.position.x, b.mesh.position.z,
                             u.mesh.position.x, u.mesh.position.z)) {
            spawnFlash(b.mesh.position, BULLET_RED_COLOR);
            scatterUnits(blueUnits, b.mesh.position.x, b.mesh.position.z, 80);
            b.destroy();
            break;
          }
        }
        // Red bullet reaches blue wall (positive Z edge) — red gets reward
        if (b.alive && b.mesh.position.z > HALF_D) {
          b.destroy();
          spawnUnit('red');
          redScore++;
        }
      }

      // ── Collision: blue bullets vs red units ──
      for (const b of blueBullets) {
        if (!b.alive) continue;
        for (const u of redUnits) {
          if (bulletHitsUnit(b.mesh.position.x, b.mesh.position.z,
                             u.mesh.position.x, u.mesh.position.z)) {
            spawnFlash(b.mesh.position, BULLET_BLUE_COLOR);
            scatterUnits(redUnits, b.mesh.position.x, b.mesh.position.z, 80);
            b.destroy();
            break;
          }
        }
        // Blue bullet reaches red wall (negative Z edge) — blue gets reward
        if (b.alive && b.mesh.position.z < -HALF_D) {
          b.destroy();
          spawnUnit('blue');
          blueScore++;
        }
      }

      // ── Win check ──
      checkWin();

      // ── Update HUD ──
      updateHUD();

      // ── Unit animations ──
      const t = now / 1000;
      for (const u of blueUnits) {
        if (u.spawnScale < 1) {
          u.spawnScale = Math.min(1, u.spawnScale + dt * 4);
          u.mesh.scale.setScalar(u.spawnScale);
        }
        u.mesh.position.y = 0.04 * Math.sin(t * 2.5 + u.bobOffset);
      }
      for (const u of redUnits) {
        if (u.spawnScale < 1) {
          u.spawnScale = Math.min(1, u.spawnScale + dt * 4);
          u.mesh.scale.setScalar(u.spawnScale);
        }
        u.mesh.position.y = 0.04 * Math.sin(t * 2.5 + u.bobOffset);
      }

      renderer.render(scene, camera);
    }
    gameLoop();
  </script>
</body>
</html>
